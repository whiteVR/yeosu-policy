<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강하고 진실한 백인숙 - 20대 정책공약</title>

  <!-- OG 태그 -->
  <meta property="og:type" content="article" />
  <meta property="og:title" content="[강하고 진실한 백인숙]" />
  <meta property="og:description" content="백인숙의 정책공약 : 백인숙이 해내겠습니다!" />
  <meta property="og:image" content="https://i.imgur.com/FZkAGAY.png" />
  <meta property="og:image:width" content="1088" />
  <meta property="og:image:height" content="570" />
  <meta property="og:url" content="https://blog.naver.com/bik6107/224213979959" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0f1923;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ★★ [초기 화면 레이아웃] 전체를 세로 중앙 정렬 ★★ */
    .page-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      padding: 12px 16px 4px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fee500, #ff9500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      font-size: 12px;
      color: #8899aa;
      margin-top: 2px;
    }

    .effect-tabs {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .tab-btn {
      padding: 6px 14px;
      border: 1px solid #2a3a4a;
      border-radius: 20px;
      background: transparent;
      color: #8899aa;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.3s;
    }

    .tab-btn.active {
      background: #fee500;
      color: #191919;
      border-color: #fee500;
    }

    /* ★★ [이미지 영역] flex:1로 남은 공간을 채워서 정중앙 배치 ★★ */
    .slider-wrapper {
      max-width: 500px;
      width: 100%;
      margin: 0 auto;
      padding: 0 8px;
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 공통 슬라이더 컨테이너 - aspect-ratio 제거, 높이를 자동 계산 */
    .slider-slide, .slider-cube, .slider-fade, .slider-auto {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      width: 100%;
      height: calc(100vh - 200px); /* ★★ [이미지 높이] 화면에서 헤더/탭/버튼 영역을 뺀 높이 ★★ */
      max-height: 75vh;
      background: #1a2a3a;
    }

    /* 효과 1: 슬라이드 */
    .slider-slide .slide-track {
      display: flex;
      transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
      height: 100%;
      width: 100%;
    }

    .slider-slide .slide-item {
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;     /* ★★ [정중앙 - 세로] ★★ */
      justify-content: center; /* ★★ [정중앙 - 가로] ★★ */
    }

    .slider-slide .slide-item img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    /* ★★ [큐브 회전속도] 아래 1.5s를 변경 (예: 2.5s = 더 느리게) ★★ */
    .slider-cube {
      perspective: 1200px;
    }

    .cube-scene {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); /* ★★ [큐브 회전속도] ★★ */
    }

    .cube-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cube-face img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    /* ★★ [페이드 전환속도] 아래 1.5s를 변경 ★★ */
    .slider-fade .fade-item {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 2.5s ease; /* ★★ [페이드 전환속도] ★★ */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slider-fade .fade-item.active { opacity: 1; }

    .slider-fade .fade-item img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    /* ★★ [자동재생 전환속도] 아래 1.2s를 변경 ★★ */
    .slider-auto .auto-item {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transform: scale(1.03);
      transition: opacity 2.0s ease, transform 5s ease; /* ★★ [자동재생 전환속도] ★★ */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slider-auto .auto-item.active {
      opacity: 1;
      transform: scale(1);
    }

    .slider-auto .auto-item img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .auto-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: #fee500;
      transition: width linear;
      z-index: 10;
    }

    /* 네비게이션 */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .nav-btn:hover { background: rgba(0,0,0,0.8); }
    .nav-btn.prev { left: 6px; }
    .nav-btn.next { right: 6px; }

    .indicators {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 8px;
      flex-shrink: 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2a3a4a;
      transition: all 0.3s;
      cursor: pointer;
    }

    .dot.active {
      background: #fee500;
      width: 24px;
      border-radius: 4px;
    }

    .counter {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 11px;
      color: #fff;
      z-index: 10;
    }

    .btn-area {
      max-width: 500px;
      width: 100%;
      margin: 0 auto;
      padding: 4px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .blog-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #03C75A;
      color: #fff;
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      text-decoration: none;
      transition: background 0.2s;
    }

    .blog-btn:hover { background: #02b350; }

    .kakao-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #FEE500;
      color: #191919;
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: background 0.2s;
    }

    .kakao-btn:hover { background: #f0d900; }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      .header { padding: 10px 16px 2px; }
      .header h1 { font-size: 16px; }
      .header p { font-size: 11px; }
      .effect-tabs { padding: 6px 8px; gap: 5px; }
      .tab-btn { padding: 5px 10px; font-size: 11px; }
      .btn-area { padding: 4px 12px 16px; gap: 6px; }
      .blog-btn, .kakao-btn { padding: 12px 20px; font-size: 14px; }
    }
  </style>
</head>
<body>

  <div class="page-wrap">
    <div class="header">
      <h1>여수 관광4.0 - 그랜드스트림</h1>
      <p>좌우로 넘기거나 효과를 선택해보세요</p>
    </div>

    <div class="effect-tabs">
      <button class="tab-btn active" onclick="switchEffect('slide')">슬라이드</button>
      <button class="tab-btn" onclick="switchEffect('cube')">3D 큐브</button>
      <button class="tab-btn" onclick="switchEffect('fade')">페이드</button>
      <button class="tab-btn" onclick="switchEffect('auto')">자동재생</button>
    </div>

    <div class="slider-wrapper">
      <div class="slider-slide" id="slider-slide">
        <div class="counter"><span id="slide-counter">1</span> / <span id="slide-total"></span></div>
        <div class="slide-track" id="slide-track"></div>
        <button class="nav-btn prev" onclick="slideNav(-1)">❮</button>
        <button class="nav-btn next" onclick="slideNav(1)">❯</button>
      </div>

      <div class="slider-cube hidden" id="slider-cube">
        <div class="counter"><span id="cube-counter">1</span> / <span id="cube-total"></span></div>
        <div class="cube-scene" id="cube-scene"></div>
        <button class="nav-btn prev" onclick="cubeNav(-1)">❮</button>
        <button class="nav-btn next" onclick="cubeNav(1)">❯</button>
      </div>

      <div class="slider-fade hidden" id="slider-fade">
        <div class="counter"><span id="fade-counter">1</span> / <span id="fade-total"></span></div>
        <button class="nav-btn prev" onclick="fadeNav(-1)">❮</button>
        <button class="nav-btn next" onclick="fadeNav(1)">❯</button>
      </div>

      <div class="slider-auto hidden" id="slider-auto">
        <div class="counter"><span id="auto-counter">1</span> / <span id="auto-total"></span></div>
        <div class="auto-progress" id="auto-progress"></div>
      </div>
    </div>

    <div class="indicators" id="indicators"></div>

    <div class="btn-area">
      <a class="blog-btn" id="blogLink" href="#" target="_blank">📄 정책 이야기 살펴보기</a>
      <button class="kakao-btn" onclick="shareKakao()">
        <svg viewBox="0 0 24 24" fill="#191919" width="20" height="20">
          <path d="M12 3C6.48 3 2 6.58 2 11c0 2.83 1.88 5.32 4.71 6.73-.17.6-.63 2.19-.72 2.53-.12.42.15.41.32.3.13-.09 2.09-1.38 2.94-1.94.57.08 1.16.13 1.75.13 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/>
        </svg>
        카카오톡으로 공유하기
      </button>
    </div>
  </div>

  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js" crossorigin="anonymous"></script>

  <script>
    /* ★★★ 아래를 수정하세요 ★★★ */

    var KAKAO_APP_KEY = '74b9b0af38e1d5aaa92bde4901ca4022';
    var BLOG_URL = 'https://blog.naver.com/bik6107/224213979959';
    var THUMBNAIL_URL = 'https://i.imgur.com/FZkAGAY.png';

    var IMAGES = [
      'https://i.imgur.com/Pu5APiK.png',
      'https://i.imgur.com/DNLdlT7.png',
      'https://i.imgur.com/a0RgtaG.png',
      'https://i.imgur.com/vvkCdTg.png,
      'https://i.imgur.com/1hLoDOg.png',
      'https://i.imgur.com/GKfvJPN.png',
      'https://i.imgur.com/oDniHQ9.png',
      'https://i.imgur.com/trWdjaF.png',
    ];

    /* ★★★ 여기까지 수정 ★★★ */

    var currentSlide = 0;
    var currentEffect = 'slide';
    var autoTimer = null;
    var slideAutoTimer = null;
    var total = IMAGES.length;
    var isSlideAnimating = false;
    var cubeAngle = 0;

    if (BLOG_URL && !BLOG_URL.startsWith('★')) {
      document.getElementById('blogLink').href = BLOG_URL;
    }

    try { if (!Kakao.isInitialized()) Kakao.init(KAKAO_APP_KEY); } catch(e) {}

    function init() {
      buildSlide();
      buildCube();
      buildFade();
      buildAuto();
      updateIndicators();
      startSlideAuto();
    }

    // ===== 슬라이드 (1→2→3→4→1 자연스러운 루프) =====
    function buildSlide() {
      var track = document.getElementById('slide-track');
      var html = IMAGES.map(function(src) {
        return '<div class="slide-item"><img src="' + src + '"></div>';
      }).join('');
      html += '<div class="slide-item"><img src="' + IMAGES[0] + '"></div>';
      track.innerHTML = html;
      document.getElementById('slide-total').textContent = total;
    }

    function slideNav(dir) {
      if (isSlideAnimating) return;
      var track = document.getElementById('slide-track');

      if (dir === 1) {
        currentSlide++;
        track.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1)';
        track.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';
        if (currentSlide === total) {
          isSlideAnimating = true;
          setTimeout(function() {
            track.style.transition = 'none';
            currentSlide = 0;
            track.style.transform = 'translateX(0)';
            isSlideAnimating = false;
          }, 520);
        }
      } else {
        if (currentSlide === 0) {
          isSlideAnimating = true;
          track.style.transition = 'none';
          currentSlide = total;
          track.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';
          setTimeout(function() {
            currentSlide = total - 1;
            track.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1)';
            track.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';
            isSlideAnimating = false;
          }, 30);
        } else {
          currentSlide--;
          track.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1)';
          track.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';
        }
      }

      var displaySlide = currentSlide >= total ? 0 : currentSlide;
      document.getElementById('slide-counter').textContent = displaySlide + 1;
      updateIndicators(displaySlide);
      resetSlideAuto();
    }

    /* ★★ [슬라이드 자동재생 시간] 4000 = 4초 ★★ */
    function startSlideAuto() {
      stopSlideAuto();
      slideAutoTimer = setInterval(function() {
        if (currentEffect === 'slide') slideNav(1);
      }, 4000); /* ★★ [슬라이드 자동재생 시간] ★★ */
    }

    function stopSlideAuto() { if (slideAutoTimer) clearInterval(slideAutoTimer); }
    function resetSlideAuto() { stopSlideAuto(); startSlideAuto(); }

    // ===== 3D 큐브 (1→2→3→4→1 자연스러운 루프) =====
    function buildCube() {
      var scene = document.getElementById('cube-scene');
      var container = document.getElementById('slider-cube');
      var w = container.offsetWidth || 400;
      var tz = w / 2;
      // 4면 큐브: 0도, 90도, 180도, 270도
      scene.innerHTML = IMAGES.map(function(src, i) {
        return '<div class="cube-face" style="transform:rotateY(' + (i * 90) + 'deg) translateZ(' + tz + 'px)"><img src="' + src + '"></div>';
      }).join('');
      document.getElementById('cube-total').textContent = total;
      cubeAngle = 0;
      currentSlide = 0;
    }

    function cubeNav(dir) {
      // 항상 같은 방향으로 90도씩 회전 → 자연스러운 루프
      cubeAngle += dir * 90;
      document.getElementById('cube-scene').style.transform = 'rotateY(' + (-cubeAngle) + 'deg)';

      if (dir === 1) {
        currentSlide = (currentSlide + 1) % total;
      } else {
        currentSlide = (currentSlide - 1 + total) % total;
      }
      document.getElementById('cube-counter').textContent = currentSlide + 1;
      updateIndicators();
    }

    // ===== 페이드 =====
    function buildFade() {
      var container = document.getElementById('slider-fade');
      var navBtns = container.querySelectorAll('.nav-btn');
      var counterEl = container.querySelector('.counter');
      var html = '';
      IMAGES.forEach(function(src, i) {
        html += '<div class="fade-item ' + (i === 0 ? 'active' : '') + '"><img src="' + src + '"></div>';
      });
      container.innerHTML = html;
      container.appendChild(counterEl);
      navBtns.forEach(function(btn) { container.appendChild(btn); });
      document.getElementById('fade-total').textContent = total;
    }

    function fadeNav(dir) {
      var items = document.querySelectorAll('#slider-fade .fade-item');
      items[currentSlide].classList.remove('active');
      currentSlide = (currentSlide + dir + total) % total;
      items[currentSlide].classList.add('active');
      document.getElementById('fade-counter').textContent = currentSlide + 1;
      updateIndicators();
    }

    // ===== 자동재생 =====
    function buildAuto() {
      var container = document.getElementById('slider-auto');
      var progress = document.getElementById('auto-progress');
      var counterEl = container.querySelector('.counter');
      var html = '';
      IMAGES.forEach(function(src, i) {
        html += '<div class="auto-item ' + (i === 0 ? 'active' : '') + '"><img src="' + src + '"></div>';
      });
      container.innerHTML = html;
      container.appendChild(counterEl);
      container.appendChild(progress);
      document.getElementById('auto-total').textContent = total;
    }

    function startAuto() {
      stopAuto();
      /* ★★ [자동재생 대기시간] 4000 = 4초마다 전환 ★★ */
      var duration = 4000; /* ★★ [자동재생 대기시간] ★★ */
      var progressEl = document.getElementById('auto-progress');
      progressEl.style.transition = 'none';
      progressEl.style.width = '0%';
      setTimeout(function() {
        progressEl.style.transition = 'width ' + duration + 'ms linear';
        progressEl.style.width = '100%';
      }, 50);

      autoTimer = setInterval(function() {
        var items = document.querySelectorAll('#slider-auto .auto-item');
        items[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % total;
        items[currentSlide].classList.add('active');
        document.getElementById('auto-counter').textContent = currentSlide + 1;
        updateIndicators();
        progressEl.style.transition = 'none';
        progressEl.style.width = '0%';
        setTimeout(function() {
          progressEl.style.transition = 'width ' + duration + 'ms linear';
          progressEl.style.width = '100%';
        }, 50);
      }, duration);
    }

    function stopAuto() { if (autoTimer) clearInterval(autoTimer); }

    // ===== 효과 전환 =====
    function switchEffect(effect) {
      stopAuto();
      stopSlideAuto();
      currentSlide = 0;
      currentEffect = effect;

      document.querySelectorAll('.tab-btn').forEach(function(btn) { btn.classList.remove('active'); });
      event.target.classList.add('active');

      document.getElementById('slider-slide').classList.toggle('hidden', effect !== 'slide');
      document.getElementById('slider-cube').classList.toggle('hidden', effect !== 'cube');
      document.getElementById('slider-fade').classList.toggle('hidden', effect !== 'fade');
      document.getElementById('slider-auto').classList.toggle('hidden', effect !== 'auto');

      if (effect === 'slide') {
        var track = document.getElementById('slide-track');
        track.style.transition = 'none';
        track.style.transform = 'translateX(0)';
        document.getElementById('slide-counter').textContent = 1;
        startSlideAuto();
      } else if (effect === 'cube') {
        buildCube();
      } else if (effect === 'fade') {
        document.querySelectorAll('#slider-fade .fade-item').forEach(function(item, i) {
          item.classList.toggle('active', i === 0);
        });
        document.getElementById('fade-counter').textContent = 1;
      } else if (effect === 'auto') {
        document.querySelectorAll('#slider-auto .auto-item').forEach(function(item, i) {
          item.classList.toggle('active', i === 0);
        });
        document.getElementById('auto-counter').textContent = 1;
        startAuto();
      }
      updateIndicators();
    }

    // ===== 인디케이터 =====
    function updateIndicators(overrideIndex) {
      var activeIndex = (overrideIndex !== undefined) ? overrideIndex : currentSlide;
      if (activeIndex >= total) activeIndex = 0;
      var html = '';
      for (var i = 0; i < total; i++) {
        html += '<div class="dot ' + (i === activeIndex ? 'active' : '') + '" onclick="goToSlide(' + i + ')"></div>';
      }
      document.getElementById('indicators').innerHTML = html;
    }

    function goToSlide(index) {
      var prevSlide = currentSlide;
      currentSlide = index;

      if (currentEffect === 'slide') {
        var track = document.getElementById('slide-track');
        track.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1)';
        track.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';
        document.getElementById('slide-counter').textContent = currentSlide + 1;
        resetSlideAuto();
      } else if (currentEffect === 'cube') {
        var diff = index - prevSlide;
        cubeAngle += diff * 90;
        document.getElementById('cube-scene').style.transform = 'rotateY(' + (-cubeAngle) + 'deg)';
        document.getElementById('cube-counter').textContent = currentSlide + 1;
      } else if (currentEffect === 'fade') {
        var items = document.querySelectorAll('#slider-fade .fade-item');
        items[prevSlide].classList.remove('active');
        items[currentSlide].classList.add('active');
        document.getElementById('fade-counter').textContent = currentSlide + 1;
      } else if (currentEffect === 'auto') {
        var items = document.querySelectorAll('#slider-auto .auto-item');
        items[prevSlide].classList.remove('active');
        items[currentSlide].classList.add('active');
        document.getElementById('auto-counter').textContent = currentSlide + 1;
      }
      updateIndicators();
    }

    // 터치 스와이프
    var touchStartX = 0;
    document.addEventListener('touchstart', function(e) { touchStartX = e.touches[0].clientX; });
    document.addEventListener('touchend', function(e) {
      var diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) {
        var dir = diff > 0 ? 1 : -1;
        if (currentEffect === 'slide') slideNav(dir);
        else if (currentEffect === 'cube') cubeNav(dir);
        else if (currentEffect === 'fade') fadeNav(dir);
      }
    });

    // 카카오톡 공유
    function shareKakao() {
      if (typeof Kakao === 'undefined' || !Kakao.isInitialized()) {
        alert('카카오 SDK가 준비되지 않았습니다.');
        return;
      }
      var shareImage = (THUMBNAIL_URL && !THUMBNAIL_URL.startsWith('★')) ? THUMBNAIL_URL : IMAGES[0];
      var shareUrl = (BLOG_URL && !BLOG_URL.startsWith('★')) ? BLOG_URL : window.location.href;
      try {
        Kakao.Share.sendDefault({
          objectType: 'feed',
          content: {
            title: '[강하고 진실한 백인숙]',
            description: '백인숙의 정책공약 : 백인숙이 해내겠습니다!',
            imageUrl: shareImage,
            imageWidth: 1200,
            imageHeight: 630,
            link: { mobileWebUrl: shareUrl, webUrl: shareUrl }
          },
          buttons: [{ title: '정책 이야기 살펴보기', link: { mobileWebUrl: shareUrl, webUrl: shareUrl } }]
        });
      } catch (e) { alert('공유 오류: ' + e.message); }
    }

    init();
  </script>
