<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여수 국가산단의 대전환 - 스마트·그린 산업 수도로의 도약</title>

  <!-- OG 태그 -->
  <meta property="og:type" content="article" />
  <meta property="og:title" content=" " />
  <meta property="og:description" content=" " />
  <meta property="og:image" content="https://i.imgur.com/mrq4FS0.png" />
  <meta property="og:image:width" content="800" />
  <meta property="og:image:height" content="1200" />
  <meta property="og:url" content="https://essay18600.tistory.com/2" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 600px;
      width: 100%;
      padding: 20px 16px 40px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .image-area {
      width: 100%;
      background: #eee;
      text-align: center;
    }

    .image-area img {
      width: 100%;
      display: block;
    }

    .image-placeholder {
      padding: 40px;
      color: #999;
      font-size: 14px;
    }

    .btn-area {
      padding: 0 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .kakao-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #FEE500;
      color: #191919;
      border: none;
      padding: 15px 24px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      letter-spacing: -0.3px;
      transition: background 0.2s;
    }

    .kakao-btn:hover { background: #f0d900; }

    .kakao-btn svg { width: 22px; height: 22px; }

    .blog-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #1a3a5c;
      color: #fff;
      border: none;
      padding: 15px 24px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      letter-spacing: -0.3px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .blog-btn:hover { background: #2c5f8a; }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="image-area" id="imageArea">
        <div class="image-placeholder">이미지를 불러오는 중...</div>
      </div>

      <div class="btn-area" style="margin-top: 20px;">
        <button class="kakao-btn" onclick="shareKakao()">
          <svg viewBox="0 0 24 24" fill="#191919">
            <path d="M12 3C6.48 3 2 6.58 2 11c0 2.83 1.88 5.32 4.71 6.73-.17.6-.63 2.19-.72 2.53-.12.42.15.41.32.3.13-.09 2.09-1.38 2.94-1.94.57.08 1.16.13 1.75.13 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/>
          </svg>
          카카오톡으로 공유하기
        </button>

        <a class="blog-btn" id="blogLink" href="#" target="_blank">
          📄 정책 자세히 보기
        </a>
      </div>
    </div>
  </div>

  <!-- 카카오 SDK -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js" crossorigin="anonymous"></script>

  <script>
    /* ★★★ 아래 3가지만 수정하세요 ★★★ */

    var KAKAO_APP_KEY = '74b9b0af38e1d5aaa92bde4901ca4022';
    var IMAGE_URL    = 'https://i.imgur.com/mrq4FS0.png';
    var BLOG_URL     = 'https://essay18600.tistory.com/2';

    /* 아래는 수정하지 마세요 */

    // 이미지 표시
    (function() {
      if (IMAGE_URL) {
        var img = new Image();
        img.onload = function() {
          document.getElementById('imageArea').innerHTML = '<img src="' + IMAGE_URL + '" alt="정책공약">';
        };
        img.onerror = function() {
          document.getElementById('imageArea').innerHTML = '<div class="image-placeholder">이미지를 불러올 수 없습니다.</div>';
        };
        img.src = IMAGE_URL;
      }
    })();

    // 블로그 링크
    if (BLOG_URL) {
      document.getElementById('blogLink').href = BLOG_URL;
    }

    // SDK 초기화
    try {
      if (!Kakao.isInitialized()) {
        Kakao.init(KAKAO_APP_KEY);
      }
    } catch (e) {
      console.error('SDK 초기화 오류:', e);
    }

    // 카카오톡 공유
    function shareKakao() {
      if (typeof Kakao === 'undefined' || !Kakao.isInitialized()) {
        alert('카카오 SDK가 준비되지 않았습니다.\n페이지를 새로고침 해주세요.');
        return;
      }

      try {
        Kakao.Share.sendDefault({
          objectType: 'feed',
          content: {
            title: ' ',
            description: ' ',
            imageUrl: IMAGE_URL,
            imageWidth: 800,
            imageHeight: 1200,
            link: {
              mobileWebUrl: BLOG_URL,
              webUrl: BLOG_URL
            }
          },
          buttons: [
            {
              title: '정책 자세히 보기',
              link: {
                mobileWebUrl: BLOG_URL,
                webUrl: BLOG_URL
              }
            }
          ]
        });
      } catch (e) {
        alert('공유 중 오류가 발생했습니다:\n' + e.message);
      }
    }
  </script>

</body>
</html>
